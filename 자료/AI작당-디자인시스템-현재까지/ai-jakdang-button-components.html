<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AI작당 버튼 컴포넌트</title>
<style>
:root{--color-primary:#3030c0;--color-primary-hover:#2828aa;--color-primary-active:#20208a;--color-primary-soft:#eef0ff;--color-danger:#e52d2d;--color-danger-hover:#cf2525;--color-danger-active:#b91f1f;--color-surface:#fff;--color-bg:#f7f8fc;--color-text:#171827;--color-text-sub:#5f6473;--color-border:#e4e7f0;--color-disabled-bg:#f0f2f8;--color-disabled-text:#aab0c0;--focus-ring:0 0 0 4px rgba(48,48,192,.18)}
*{box-sizing:border-box}body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.page{max-width:1180px;margin:0 auto;padding:56px 24px 80px}.header{margin-bottom:32px}.header h1{margin:0 0 10px;font-size:36px;font-weight:700;letter-spacing:-.03em}.header p{margin:0;color:var(--color-text-sub);font-size:16px}.panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:16px;box-shadow:0 8px 24px rgba(23,24,39,.08);overflow:hidden}.section{padding:28px 30px;border-bottom:1px solid var(--color-border)}.section:last-child{border-bottom:0}.section h2{margin:0 0 18px;font-size:20px;font-weight:700}.grid{display:grid;grid-template-columns:170px repeat(5,minmax(130px,1fr));gap:14px;align-items:center}.label{font-size:14px;font-weight:600;color:var(--color-text-sub)}
.btn{--btn-bg:transparent;--btn-color:var(--color-text);--btn-border:transparent;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-width:118px;border:1px solid var(--btn-border);border-radius:8px;background:var(--btn-bg);color:var(--btn-color);font:600 15px/1 Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;white-space:nowrap;cursor:pointer;user-select:none;text-decoration:none;transition:background-color .16s ease,border-color .16s ease,color .16s ease,box-shadow .16s ease,transform .08s ease}.btn:focus-visible{outline:none;box-shadow:var(--focus-ring)}.btn:active{transform:translateY(1px)}.btn:disabled,.btn[aria-disabled="true"]{cursor:not-allowed;pointer-events:none}.btn--lg{height:44px;padding:0 20px;font-size:16px}.btn--md{height:40px;padding:0 16px;font-size:15px}.btn--sm{height:36px;padding:0 14px;font-size:14px}.btn--primary{--btn-bg:var(--color-primary);--btn-color:#fff}.btn--primary:hover,.demo-hover.btn--primary{--btn-bg:var(--color-primary-hover)}.btn--primary:active,.demo-active.btn--primary{--btn-bg:var(--color-primary-active)}.btn--primary:disabled{--btn-bg:var(--color-disabled-bg);--btn-color:var(--color-disabled-text)}.btn--secondary{--btn-bg:#fff;--btn-color:var(--color-primary);--btn-border:var(--color-primary)}.btn--secondary:hover,.demo-hover.btn--secondary{--btn-bg:var(--color-primary-soft)}.btn--secondary:active,.demo-active.btn--secondary{--btn-bg:#e2e5ff;--btn-color:var(--color-primary-active);--btn-border:var(--color-primary-active)}.btn--secondary:disabled{--btn-bg:#fff;--btn-color:var(--color-disabled-text);--btn-border:var(--color-border)}.btn--ghost{--btn-bg:transparent;--btn-color:var(--color-primary)}.btn--ghost:hover,.demo-hover.btn--ghost{--btn-bg:var(--color-primary-soft)}.btn--ghost:active,.demo-active.btn--ghost{--btn-bg:#e2e5ff;--btn-color:var(--color-primary-active)}.btn--ghost:disabled{--btn-bg:transparent;--btn-color:var(--color-disabled-text)}.btn--danger{--btn-bg:var(--color-danger);--btn-color:#fff}.btn--danger:hover,.demo-hover.btn--danger{--btn-bg:var(--color-danger-hover)}.btn--danger:active,.demo-active.btn--danger{--btn-bg:var(--color-danger-active)}.btn--danger:disabled{--btn-bg:#fceaea;--btn-color:#d89a9a}.btn__icon{width:1.1em;height:1.1em;display:inline-block;flex:0 0 auto}.btn--icon{min-width:0;padding:0;aspect-ratio:1/1}.btn--icon.btn--lg{width:44px}.btn--icon.btn--md{width:40px}.btn--icon.btn--sm{width:36px}.btn--full{width:100%}.spinner{width:16px;height:16px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.size-row,.icon-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}.full-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.label{grid-column:1/-1;margin-top:10px}}@media(max-width:560px){.page{padding:30px 14px 50px}.section{padding:22px 18px}.grid{grid-template-columns:1fr}.full-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="page"><header class="header"><h1>AI작당 버튼 컴포넌트</h1><p>Variant × Size × State × Icon × Width 조합형 버튼 시스템</p></header><div class="panel">
<section class="section"><h2>버튼 종류와 상태</h2><div class="grid"><div></div><div class="label">Default</div><div class="label">Hover</div><div class="label">Active</div><div class="label">Disabled</div><div class="label">Loading</div>
<div class="label">Primary</div><button class="btn btn--primary btn--md">새 글 작성</button><button class="btn btn--primary btn--md demo-hover">새 글 작성</button><button class="btn btn--primary btn--md demo-active">새 글 작성</button><button class="btn btn--primary btn--md" disabled>새 글 작성</button><button class="btn btn--primary btn--md"><span class="spinner"></span>등록 중</button>
<div class="label">Secondary</div><button class="btn btn--secondary btn--md">다운로드</button><button class="btn btn--secondary btn--md demo-hover">다운로드</button><button class="btn btn--secondary btn--md demo-active">다운로드</button><button class="btn btn--secondary btn--md" disabled>다운로드</button><button class="btn btn--secondary btn--md"><span class="spinner"></span>처리 중</button>
<div class="label">Ghost</div><button class="btn btn--ghost btn--md">취소</button><button class="btn btn--ghost btn--md demo-hover">취소</button><button class="btn btn--ghost btn--md demo-active">취소</button><button class="btn btn--ghost btn--md" disabled>취소</button><button class="btn btn--ghost btn--md"><span class="spinner"></span>대기 중</button>
<div class="label">Danger</div><button class="btn btn--danger btn--md">삭제하기</button><button class="btn btn--danger btn--md demo-hover">삭제하기</button><button class="btn btn--danger btn--md demo-active">삭제하기</button><button class="btn btn--danger btn--md" disabled>삭제하기</button><button class="btn btn--danger btn--md"><span class="spinner"></span>삭제 중</button>
</div></section>
<section class="section"><h2>크기</h2><div class="size-row"><button class="btn btn--primary btn--lg">Large 44px</button><button class="btn btn--primary btn--md">Medium 40px</button><button class="btn btn--primary btn--sm">Small 36px</button></div></section>
<section class="section"><h2>아이콘 조합</h2><div class="icon-row"><button class="btn btn--primary btn--md"><span class="btn__icon">＋</span><span>자료 등록</span></button><button class="btn btn--secondary btn--md"><span>다운로드</span><span class="btn__icon">↓</span></button><button class="btn btn--ghost btn--md btn--icon" aria-label="저장">♡</button><button class="btn btn--danger btn--md btn--icon" aria-label="삭제">×</button></div></section>
<section class="section"><h2>전체 너비</h2><div class="full-row"><button class="btn btn--primary btn--lg btn--full">모바일 전체 너비 버튼</button><button class="btn btn--secondary btn--lg btn--full">보조 전체 너비 버튼</button></div></section>
</div></main></body></html>
